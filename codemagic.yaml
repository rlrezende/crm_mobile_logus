workflows:
  release-builds:
    name: Logus CRM Mobile
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - varivellogus
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.logus.crm
      android_signing:
        - logus-android-key
      # Codemagic já fornece Xcode/Android SDK quando necessário
      vars:
        API_BASE_URL: https://crmapi.loguscapital.com:446/api
        LOG_NETWORK: "false"
        APP_STORE_APP_ID: "6761010977"
        BUNDLE_ID: "com.logus.crm"
    scripts:
#      - name: Use Flutter channel stable
#        script: |
#          echo "Skipping default Flutter install"
      - name: Setup Flutter 3.41.4
        script: |
          git clone --branch 3.41.4 --depth 1 https://github.com/flutter/flutter.git /tmp/flutter_3_41
          /tmp/flutter_3_41/bin/flutter --version
      - name: Precache Flutter artifacts (iOS/Android)
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          flutter precache --ios --android
      - name: Ensure Android SDK/NDK
        script: |
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses >/dev/null || true
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;29.0.14033849"
      - name: Install dependencies
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          flutter clean
          flutter pub get
      - name: Validate iOS project and Bundle ID
        script: |
          test -d ios
          test -f ios/Runner.xcodeproj/project.pbxproj
          test -f ios/Podfile
          grep -q "PRODUCT_BUNDLE_IDENTIFIER = com.logus.crm;" ios/Runner.xcodeproj/project.pbxproj
      - name: Validate App Store Connect credentials
        script: |
          : "${APP_STORE_CONNECT_KEY_ID:?Missing APP_STORE_CONNECT_KEY_ID}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Missing APP_STORE_CONNECT_ISSUER_ID}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Missing APP_STORE_CONNECT_PRIVATE_KEY}"
          if ! printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY is invalid: missing BEGIN PRIVATE KEY"
            exit 1
          fi
          if ! printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "END PRIVATE KEY"; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY is invalid: missing END PRIVATE KEY"
            exit 1
          fi
      - name: Run tests
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          flutter test
      - name: Build Android APK (release)
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          flutter build apk --release \
            --dart-define API_BASE_URL=$API_BASE_URL \
            --dart-define LOG_NETWORK=$LOG_NETWORK
      - name: Build Android App Bundle (release)
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          flutter build appbundle --release \
            --dart-define API_BASE_URL=$API_BASE_URL \
            --dart-define LOG_NETWORK=$LOG_NETWORK
      - name: Install CocoaPods
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          cd ios
          rm -rf Pods Podfile.lock
          pod install
      - name: Configure automatic code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Validate export method and set build number
        script: |
          IOS_EXPORT_OPTIONS_PLIST="${CM_EXPORT_OPTIONS_PATH:-}"
          if [ -n "$IOS_EXPORT_OPTIONS_PLIST" ] && [ -f "$IOS_EXPORT_OPTIONS_PLIST" ]; then
            echo "Using Codemagic export options: $IOS_EXPORT_OPTIONS_PLIST"
          elif [ -f "$HOME/export_options.plist" ]; then
            IOS_EXPORT_OPTIONS_PLIST="$HOME/export_options.plist"
            echo "Using existing export options: $IOS_EXPORT_OPTIONS_PLIST"
          else
            IOS_EXPORT_OPTIONS_PLIST="$HOME/export_options.plist"
            cat > "$IOS_EXPORT_OPTIONS_PLIST" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
            echo "Created fallback export options: $IOS_EXPORT_OPTIONS_PLIST"
          fi

          METHOD=$(/usr/libexec/PlistBuddy -c "Print :method" "$IOS_EXPORT_OPTIONS_PLIST" 2>/dev/null || true)
          if [ "$METHOD" != "app-store" ]; then
            echo "Invalid export method '$METHOD' (expected app-store)"
            exit 1
          fi

          echo "IOS_EXPORT_OPTIONS_PLIST=$IOS_EXPORT_OPTIONS_PLIST" >> "$CM_ENV"
          echo "Using export method: $METHOD"

          if [ -n "${CM_BUILD_ID:-}" ] && printf '%s' "$CM_BUILD_ID" | grep -Eq '^[0-9]+$'; then
            IOS_BUILD_NUMBER="$CM_BUILD_ID"
          else
            IOS_BUILD_NUMBER="$(date +%Y%m%d%H%M%S)"
          fi
          echo "IOS_BUILD_NUMBER=$IOS_BUILD_NUMBER" >> "$CM_ENV"
          echo "Using iOS build number: $IOS_BUILD_NUMBER"
      - name: Build signed iOS IPA
        script: |
          export PATH=/tmp/flutter_3_41/bin:$PATH
          flutter build ipa --release \
            --build-number="$IOS_BUILD_NUMBER" \
            --export-options-plist="$IOS_EXPORT_OPTIONS_PLIST" \
            --dart-define API_BASE_URL=$API_BASE_URL \
            --dart-define LOG_NETWORK=$LOG_NETWORK
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
