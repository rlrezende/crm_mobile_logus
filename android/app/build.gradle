plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def cmKeyAlias = System.getenv("CM_KEY_ALIAS")
def cmKeyPassword = System.getenv("CM_KEY_PASSWORD")
def cmKeystorePassword = System.getenv("CM_KEYSTORE_PASSWORD")
def cmKeystorePath = System.getenv("CM_KEYSTORE_PATH")

android {
    namespace = "com.logus.crm"
    compileSdk = 36
    ndkVersion = "29.0.14033849"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.logus.crm"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 21
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = cmKeyAlias ?: keystoreProperties["keyAlias"]
            keyPassword = cmKeyPassword ?: keystoreProperties["keyPassword"]
            storePassword = cmKeystorePassword ?: keystoreProperties["storePassword"]

            def storeFilePath = cmKeystorePath ?: keystoreProperties["storeFile"]
            if (storeFilePath != null && !storeFilePath.toString().trim().isEmpty()) {
                storeFile = file(storeFilePath)
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}
